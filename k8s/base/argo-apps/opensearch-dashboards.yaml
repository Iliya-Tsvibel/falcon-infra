apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: falcon-opensearch-dashboards
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://opensearch-project.github.io/helm-charts
    chart: opensearch-dashboards
    targetRevision: 2.28.0
    helm:
      releaseName: falcon-opensearch-dashboards
      values: |
        opensearchHosts: "http://opensearch-cluster-master.opensearch:9200"
        opensearchDashboardsUsername: "admin"
        opensearchDashboardsPassword: "Admin123_Strong!!"
        opensearchDashboardsConfig:
          opensearch_dashboards.yml: |
             server.host: "0.0.0.0"
             opensearch.ssl.verificationMode: "none"

        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "1Gi"
  destination:
    server: https://kubernetes.default.svc
    namespace: opensearch
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
