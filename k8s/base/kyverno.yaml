apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: falcon-kyverno
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://kyverno.github.io/kyverno
    targetRevision: 3.2.4
    chart: kyverno
    helm:
      releaseName: falcon-kyverno
      values: |
        replicaCount: 1
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 128Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: kyverno

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
